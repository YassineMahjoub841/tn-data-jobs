name: Weekly Pipeline

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual runs

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit data artefacts back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Scrape TanitJobs
        run: uv run python -m ingest.tanitjobs_scraper

      - name: Fetch France Travail
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
        run: uv run python -m ingest.france_travail

      - name: Run dbt (build + test)
        working-directory: dbt
        run: |
          uv run dbt deps
          uv run dbt run
          uv run dbt test

      - name: Commit updated data artefacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dbt/target/ || true
          git diff --cached --quiet || git commit -m "chore: weekly data refresh $(date -u +'%Y-%m-%d')"
          git push
